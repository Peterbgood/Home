<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Dashboard</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: #050608;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(63, 94, 251, 0.12) 0%, transparent 40%),
                radial-gradient(circle at 85% 50%, rgba(252, 70, 107, 0.08) 0%, transparent 40%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: white;
        }

        .container { max-width: 1000px; }

        .card-link {
            text-decoration: none !important;
            display: block;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card-link:hover { transform: translateY(-8px); }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 30px;
            text-align: center;
            height: 100%;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .card-link:hover .glass-card {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), inset 0 0 0 1px rgba(255, 255, 255, 0.1);
        }

        .icon-box {
            width: 64px;
            height: 64px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 1.8rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .card-title { font-weight: 700; font-size: 1.1rem; margin-bottom: 4px; color: #fff; }
        .card-text { color: rgba(255, 255, 255, 0.5); font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="row g-4 justify-content-center">
        <div class="col-6 col-md-4 col-lg-3">
            <a href="https://peterbgood.github.io/NutriGraph/" class="card-link">
                <div class="glass-card">
                    <div class="icon-box" style="background: linear-gradient(135deg, #ff5f6d, #ffc371);"><i class="bi bi-apple"></i></div>
                    <h5 class="card-title">Calories</h5>
                    <p class="card-text">Health</p>
                </div>
            </a>
        </div>

        <div class="col-6 col-md-4 col-lg-3">
            <a href="https://peterbgood.github.io/ModelY/" class="card-link">
                <div class="glass-card">
                    <div class="icon-box" style="background: linear-gradient(135deg, #2193b0, #6dd5ed);"><i class="bi bi-car-front-fill"></i></div>
                    <h5 class="card-title">Model Y</h5>
                    <p class="card-text">Tesla</p>
                </div>
            </a>
        </div>

        <div class="col-6 col-md-4 col-lg-3">
            <a href="https://peterbgood.github.io/Model3/" class="card-link">
                <div class="glass-card">
                    <div class="icon-box" style="background: linear-gradient(135deg, #4b6cb7, #182848);"><i class="bi bi-lightning-charge"></i></div>
                    <h5 class="card-title">Model 3</h5>
                    <p class="card-text">Performance</p>
                </div>
            </a>
        </div>

        <div class="col-6 col-md-4 col-lg-3">
            <a href="#" class="card-link">
                <div class="glass-card">
                    <div class="icon-box" style="background: linear-gradient(135deg, #00d2ff, #3a7bd5);"><i class="bi bi-bank"></i></div>
                    <h5 class="card-title">Savings</h5>
                    <p class="card-text">Finance</p>
                </div>
            </a>
        </div>

        <div class="col-6 col-md-4 col-lg-3">
            <a href="https://peterbgood.github.io/my-dragon/" class="card-link">
                <div class="glass-card">
                    <div class="icon-box" style="background: linear-gradient(135deg, #11998e, #38ef7d);"><i class="bi bi-lock-fill"></i></div>
                    <h5 class="card-title">Fixed Costs</h5>
                    <p class="card-text">Finance</p>
                </div>
            </a>
        </div>

        <div class="col-6 col-md-4 col-lg-3">
            <a href="https://peterbgood.github.io/budget/" class="card-link">
                <div class="glass-card">
                    <div class="icon-box" style="background: linear-gradient(135deg, #f2994a, #f2c94c);"><i class="bi bi-calendar3-range"></i></div>
                    <h5 class="card-title">Budget</h5>
                    <p class="card-text">Finance</p>
                </div>
            </a>
        </div>

        <div class="col-6 col-md-4 col-lg-3">
            <a href="https://peterbgood.github.io/vacation-budget/" class="card-link">
                <div class="glass-card">
                    <div class="icon-box" style="background: linear-gradient(135deg, #FF4B2B, #FF416C);"><i class="bi bi-sun"></i></div>
                    <h5 class="card-title">Vacation</h5>
                    <p class="card-text">Travel</p>
                </div>
            </a>
        </div>

        <div class="col-6 col-md-4 col-lg-3">
            <a href="https://peterbgood.github.io/CareerArc-Firebase/" class="card-link">
                <div class="glass-card">
                    <div class="icon-box" style="background: linear-gradient(135deg, #ee0979, #ff6a00);"><i class="bi bi-briefcase"></i></div>
                    <h5 class="card-title">Job Tracker</h5>
                    <p class="card-text">Career</p>
                </div>
            </a>
        </div>
    </div>
</div>

</body>
</html>
